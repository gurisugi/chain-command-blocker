name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pinact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          verify: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Debug - dump go env and committed binary buildinfo
        run: |
          echo "=== go version ==="
          go version
          echo "=== go env ==="
          go env
          echo "=== committed binary buildinfo (darwin_arm64) ==="
          go version -m bin/chain-command-blocker-darwin_arm64
          echo "=== committed binary buildinfo (linux_amd64) ==="
          go version -m bin/chain-command-blocker-linux_amd64

      - name: Verify committed binaries are reproducible
        run: |
          make build
          echo "=== rebuilt binary buildinfo (darwin_arm64) ==="
          go version -m bin/chain-command-blocker-darwin_arm64
          echo "=== rebuilt binary buildinfo (linux_amd64) ==="
          go version -m bin/chain-command-blocker-linux_amd64
          echo "=== diff check ==="
          git diff --exit-code bin/ || true
          echo "=== binary byte diff sample (first 64 bytes each) ==="
          for f in bin/chain-command-blocker-*; do
            echo "--- $f ---"
            echo "committed: $(git show HEAD:$f | xxd -l 64)"
            echo "rebuilt:   $(xxd -l 64 $f)"
          done
          git diff --exit-code bin/
